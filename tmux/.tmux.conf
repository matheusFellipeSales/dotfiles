# =============================================================================
# Shell & Terminal
# =============================================================================
set-option -g default-shell "/usr/bin/zsh"
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"

# =============================================================================
# General Options
# =============================================================================
set -g base-index 1                     # Windows começam em 1
setw -g pane-base-index 1               # Panes começam em 1
set -g renumber-windows on              # Renumerar ao fechar window
set -sg escape-time 0                   # Sem delay no Esc
set -g set-clipboard on                 # Yank vai pro clipboard sistema
set -g mouse on
set -g allow-passthrough on

# =============================================================================
# Prefix
# =============================================================================
set -g prefix ^A                        # Ctrl + A
set -g prefix2 C-Space                  # Ctrl + Space (secundário)
bind C-Space send-prefix -2

# =============================================================================
# Copy Mode (vim-style)
# =============================================================================
setw -g mode-keys vi
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi C-v send-keys -X rectangle-toggle
bind-key -T copy-mode-vi y send-keys -X copy-selection-and-cancel
bind-key -T copy-mode-vi Escape send-keys -X cancel

# =============================================================================
# Keybinds
# =============================================================================
# Splits
bind | split-window -h                  # vertical (lado a lado)
bind - split-window -v                  # horizontal (cima/baixo)

# Paste
bind p paste-buffer

# Swap panes (maiúsculo)
bind -r H swap-pane -t '{left-of}'
bind -r J swap-pane -t '{down-of}'
bind -r K swap-pane -t '{up-of}'
bind -r L swap-pane -t '{right-of}'

# Resize panes (Alt + hjkl)
bind -r M-h resize-pane -L 5
bind -r M-j resize-pane -D 5
bind -r M-k resize-pane -U 5
bind -r M-l resize-pane -R 5

# =============================================================================
# Status Bar
# =============================================================================
set -g status-position top
set -g status-style bg=default

# =============================================================================
# Theme: tmux-dotbar (herda palette do terminal)
# =============================================================================
set -g @tmux-dotbar-bg "default"
set -g @tmux-dotbar-fg "colour8"            # bright black
set -g @tmux-dotbar-fg-current "colour15"   # bright white
set -g @tmux-dotbar-fg-session "colour5"    # magenta
set -g @tmux-dotbar-fg-prefix "colour1"     # red
set -g @tmux-dotbar-window-status-format " #I:#W "

# =============================================================================
# Plugins (TPM)
# =============================================================================
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'azorng/tmux-smooth-scroll'
set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'vaaleyard/tmux-dotbar'

# Plugin configs
set -g @continuum-restore 'on'

run ~/.tmux/plugins/tpm/tpm
