set-option -g default-shell "/usr/bin/zsh"

set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"

set -g status-position bottom
set -g prefix ^A                        # Set mod key to cntrl + A
set -g base-index 1                     # Start Counting on 1
set -g renumber-windows on              # Renumerar ao fechar uma janela

# mouse support
set -g mouse on
set -g allow-passthrough on

set -g status-style bg=default # Im using a recent version of tmux (´you may need to use set -g status-bg default´)

# Plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'azorng/tmux-smooth-scroll'

# ### theme tokyo night
# set -g @plugin "janoamaral/tokyo-night-tmux"
# set -g @tokyo-night-tmux_theme night    # storm | day | default to 'night'
# set -g @tokyo-night-tmux_transparent 1  # 1 or 0

### theme dot bar simple tmux PERFECT THEME
set -g @plugin 'vaaleyard/tmux-dotbar'
set -g @tmux-dotbar-bg "default"
### kanagawa colors
set -g @tmux-dotbar-fg "#727169"            # Kureinai (Cinza suave)
set -g @tmux-dotbar-fg-current "#DCD7BA"    # Old White (Destaque)
set -g @tmux-dotbar-fg-session "#938AA9"    # Oni Violet
set -g @tmux-dotbar-fg-prefix "#E46876"     # Wave Red (Alerta)

# Keybinds
bind h split-window -v
bind v split-window -h

# Change panes with vim
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

run ~/.tmux/plugins/tpm/tpm
