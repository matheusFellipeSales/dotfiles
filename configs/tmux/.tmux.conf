# =============================================================================
# General Options
# =============================================================================
set-option -g default-shell "/usr/bin/zsh"
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",*:RGB"
set -g mouse on
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
set -g history-limit 50000
set -g escape-time 0
set -g focus-events on
set -g set-clipboard on
set -g allow-passthrough on
setw -g aggressive-resize on
set -g detach-on-destroy off

# =============================================================================
# Prefix
# =============================================================================
set -g prefix ^A                        # Ctrl + A
set -g prefix2 C-Space                  # Ctrl + Space (secundário)
bind C-Space send-prefix -2

# Reload config
bind q source-file ~/.tmux.conf \; display "Configuration reloaded"

# =============================================================================
# Copy Mode (vim-style)
# =============================================================================
setw -g mode-keys vi
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi C-v send -X rectangle-toggle
bind -T copy-mode-vi y send -X copy-pipe-and-cancel "wl-copy"
bind -T copy-mode-vi Escape send -X cancel
bind -T copy-mode-vi MouseDragEnd1Pane send -X copy-pipe-and-cancel "wl-copy"
bind p paste-buffer

# =============================================================================
# Keybinds
# =============================================================================
# Splits
bind | split-window -h                  # vertical (lado a lado)
bind - split-window -v                  # horizontal (cima/baixo)

# Navigate panes (vim hjkl)
bind -r h select-pane -L
bind -r j select-pane -D
bind -r k select-pane -U
bind -r l select-pane -R

# Swap panes (maiúsculo)
bind -r H swap-pane -t '{left-of}'
bind -r J swap-pane -t '{down-of}'
bind -r K swap-pane -t '{up-of}'
bind -r L swap-pane -t '{right-of}'

# Resize panes (Alt + hjkl)
bind -r M-h resize-pane -L 5
bind -r M-j resize-pane -D 5
bind -r M-k resize-pane -U 5
bind -r M-l resize-pane -R 5

# =============================================================================
# Theming
# =============================================================================
set -g status-position bottom
set -g status-interval 5
set -g status-left-length 30
set -g status-right-length 50
set -g window-status-separator ""
set -gw automatic-rename on
set -gw automatic-rename-format '#{b:pane_current_path}'

# Theme
set -g status-style "bg=default,fg=default"
set -g status-left "#[fg=black,bg=#{?client_prefix,red,blue},bold] #S #[bg=default] "
set -g status-right "#[fg=blue]#{?pane_in_mode,COPY ,}#{?window_zoomed_flag,ZOOM ,}#[fg=brightblack]#h "
set -g window-status-format "#[fg=brightblack] #I:#W "
set -g window-status-current-format "#[fg=blue,bold] #I:#W "
set -g pane-border-style "fg=brightblack"
set -g pane-active-border-style "fg=blue"
set -g message-style "bg=default,fg=blue"
set -g message-command-style "bg=default,fg=blue"
set -g mode-style "bg=blue,fg=black"
setw -g clock-mode-colour blue
